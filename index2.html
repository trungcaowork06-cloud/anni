    // ========== RENDER ==========
    const nav = document.getElementById('navButtons');
    const content = document.getElementById('content');

    // Tạo các nút
    Object.keys(chaptersData).forEach((key, index) => {
        const btn = document.createElement('button');
        btn.textContent = `Chương ${key}`;
        btn.dataset.chapter = key;
        if (index === 0) btn.classList.add('active');
        btn.addEventListener('click', () => {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderChapter(key);
        });
        nav.appendChild(btn);
    });

    // Hàm render
    function renderChapter(chapterKey) {
        const chapter = chaptersData[chapterKey];
        if (!chapter) return;

        let html = `<div class="chapter-title">${chapter.title}</div>`;

        chapter.sections.forEach(section => {
            html += `<div class="section">`;
            html += `<h3>${section.heading}</h3>`;
            html += `<div>${section.content}</div>`;
            html += `</div>`;
        });

        content.innerHTML = html;
    }

    // Mặc định hiển thị chương 1
    renderChapter('1');
</script>
</body>
</html>
